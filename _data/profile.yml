photo: /images/profile.png

currently: >
  Working on <em>LLM-driven agents for performance-sensitive
  configuration tuning</em> in distributed systems. Reading more
  systems-conference papers than I should.

bio: >
  I am a Ph.D. student in the
  <a href="https://users.encs.concordia.ca/~peterc/" target="_blank" rel="noopener">SPEAR Lab</a>
  at <a href="https://www.concordia.ca" target="_blank" rel="noopener">Concordia University</a>,
  advised by <a href="https://petertsehsun.github.io/" target="_blank" rel="noopener">Dr. Tse-Hsun (Peter) Chen</a>.
  My research sits at the intersection of <em>software performance engineering</em>,
  <em>big-data systems</em>, and <em>LLM-driven program analysis</em> — I build tools that
  help developers reason about, debug, and tune systems too large to hold in any one head.
  Before Concordia (M.Sc. 2021), I was a big-data engineer at vivo and studied software
  engineering at Xidian University (B.Eng. 2016).

interests:
  - "Software performance & configuration"
  - "Big-data systems (Spark, distributed runtimes)"
  - "LLM-driven program analysis & agents"
  - "Empirical software engineering"

